name: JP Screening (QUICK / FULL)

# 日本株スクリーニングを Mac 無しで GitHub Actions だけで安定実行するための専用ワークフロー。
# - QUICK: 上位 MAX_SYMBOLS(既定30) 銘柄だけ。5分以内で完了するテスト用。
# - FULL : 全銘柄。本番（時間がかかるので分離）。
# 既存の daily-discipline.yml / note_autosave.yml には手を加えていない。

on:
  workflow_dispatch:
    inputs:
      quick_mode:
        description: "QUICK_MODE (true=上位30銘柄だけの軽量テスト / false=全銘柄の本番)"
        type: boolean
        default: true
      max_symbols:
        description: "QUICK_MODE 時に処理する銘柄数"
        type: string
        default: "30"
  # NOTE: 本番の毎日実行は daily-discipline.yml に一本化したため、
  # このワークフローは手動テスト専用（schedule は撤去済み）。

jobs:
  screening:
    runs-on: ubuntu-latest
    # 要求どおりタイムアウトは30分。QUICK は通常5分以内で終わる安全弁。
    timeout-minutes: 30

    env:
      # 手動実行の入力値を尊重（未指定は QUICK 既定）。
      QUICK_MODE: ${{ github.event.inputs.quick_mode == 'false' && 'false' || 'true' }}
      MAX_SYMBOLS: ${{ github.event.inputs.max_symbols || '30' }}
      PROGRESS_EVERY: "25"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Self test (no network)
        run: python3 self_test.py

      - name: Run screening
        run: |
          echo "QUICK_MODE=$QUICK_MODE MAX_SYMBOLS=$MAX_SYMBOLS"
          python3 run_screening.py --include-rejected

      - name: Show result summary
        if: always()
        run: |
          echo "=== outputs ==="
          ls -la outputs/ || true
          echo "=== head of screening_result.csv ==="
          head -n 5 outputs/screening_result.csv || echo "screening_result.csv not found"
          python3 - <<'PY'
          from pathlib import Path
          import pandas as pd

          def latest(pattern: str) -> Path | None:
              files = sorted(Path("outputs").glob(pattern), key=lambda p: p.stat().st_mtime, reverse=True)
              return files[0] if files else None

          def read_csv(path: Path | None) -> pd.DataFrame:
              if path is None or not path.exists() or path.stat().st_size == 0:
                  return pd.DataFrame()
              return pd.read_csv(path, encoding="utf-8-sig")

          result = read_csv(Path("outputs/screening_result.csv"))
          highs = read_csv(latest("screening_highs_*.csv"))
          pullback = read_csv(latest("screening_pullback_*.csv"))
          retest = read_csv(latest("screening_52w_retest_*.csv"))

          buy_count = int(result.get("rank", pd.Series(dtype=object)).astype(str).str.upper().isin(["S", "A", "B"]).sum())
          high_count = int((highs.get("high_type", pd.Series(dtype=object)).astype(str) == "52W_NEW_HIGH").sum())
          ma25_count = int(pullback.get("ma25_touch", pd.Series(dtype=bool)).fillna(False).astype(bool).sum())
          ma200_count = int(pullback.get("ma200_touch", pd.Series(dtype=bool)).fillna(False).astype(bool).sum())
          retest_buy_count = int((retest.get("candidate_action", pd.Series(dtype=object)).astype(str) == "BUY").sum())
          missing_files = [
              name for name, df in {
                  "screening_result.csv": result,
                  "screening_highs_*.csv": highs,
                  "screening_pullback_*.csv": pullback,
                  "screening_52w_retest_*.csv": retest,
              }.items()
              if df.empty
          ]

          lines = [
              "## JP Screening Summary",
              "",
              f"- QUICK_MODE: `{__import__('os').environ.get('QUICK_MODE', '')}`",
              f"- MAX_SYMBOLS: `{__import__('os').environ.get('MAX_SYMBOLS', '')}`",
              f"- screening_result rows: `{len(result)}`",
              f"- BUY candidates(S/A/B): `{buy_count}`",
              f"- 52w new-high candidates: `{high_count}`",
              f"- 25MA pullback candidates: `{ma25_count}`",
              f"- 200MA touch candidates: `{ma200_count}`",
              f"- 52w retest BUY candidates: `{retest_buy_count}`",
          ]
          if missing_files:
              lines.append(f"- Missing/empty result files: `{', '.join(missing_files)}`")

          print("\n".join(lines))
          with open(__import__("os").environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
          PY

      - name: Upload screening result CSV
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screening-result
          path: |
            outputs/screening_result.csv
            outputs/screening_result_*.csv
            outputs/screening_highs_*.csv
            outputs/screening_pullback_*.csv
            outputs/screening_52w_retest_*.csv
          if-no-files-found: warn
