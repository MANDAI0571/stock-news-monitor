name: Note Autosave

on:
  workflow_dispatch:
  schedule:
    # 07:30 JST, Monday-Friday. GitHub Actions uses UTC.
    - cron: "30 22 * * 0-4"

jobs:
  note-autosave:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run daily workflow outputs
        run: python3 daily_discipline_run.py

      - name: Build note draft
        run: python3 note_draft.py

      - name: Save note draft in note.com
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python3 note_autosave.py

      - name: Send Gmail notification with note URL
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 daily_note_mail.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: note-autosave-outputs
          path: |
            outputs/*.csv
            outputs/note_daily.md
            outputs/note_title.txt
            outputs/note_daily.html
            outputs/note_draft_url.txt
          if-no-files-found: error
