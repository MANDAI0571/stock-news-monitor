name: Note Autosave

on:
  workflow_dispatch:

jobs:
  note-autosave:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore price/universe cache
        uses: actions/cache@v6
        with:
          path: cache
          key: stock-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            stock-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          start=$(date +%s)
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          end=$(date +%s); echo "[TIMER] install_dependencies elapsed=$((end-start))s"

      - name: Run daily workflow outputs
        run: |
          start=$(date +%s)
          python3 daily_discipline_run.py
          end=$(date +%s); echo "[TIMER] daily_discipline_run elapsed=$((end-start))s"

      - name: Build note draft
        run: |
          start=$(date +%s)
          python3 note_draft.py
          end=$(date +%s); echo "[TIMER] note_draft elapsed=$((end-start))s"

      - name: Show screening summary
        if: always()
        run: python3 screening_summary.py || true

      - name: Save note draft in note.com
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python3 note_autosave.py

      - name: Upload outputs
        uses: actions/upload-artifact@v7
        with:
          name: note-autosave-outputs
          path: |
            outputs/*.csv
            outputs/screening_result.csv
            outputs/note_daily.md
            outputs/note_title.txt
            outputs/note_daily.html
            outputs/note_chatgpt.md
            outputs/note_claude.md
            outputs/note_pullback.md
            outputs/note_highs.md
            outputs/note_chatgpt.html
            outputs/note_claude.html
            outputs/note_pullback.html
            outputs/note_highs.html
            outputs/note_chatgpt_title.txt
            outputs/note_claude_title.txt
            outputs/note_pullback_title.txt
            outputs/note_highs_title.txt
            outputs/note_drafts_manifest.json
            outputs/note_draft_url.txt
          if-no-files-found: warn
