name: Daily Discipline Screening

on:
  workflow_dispatch:
  schedule:
    # 07:30 JST, Monday-Friday. GitHub Actions uses UTC.
    - cron: "30 22 * * 0-4"

jobs:
  daily-discipline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screening, discipline portfolio, and optional Gmail notification
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python daily_discipline_run.py --send-gmail

      - name: Build note draft
        run: python3 note_draft.py

      - name: Upload CSV outputs
        uses: actions/upload-artifact@v4
        with:
          name: stock-news-monitor-outputs
          path: |
            outputs/*.csv
            outputs/note_daily.md
          if-no-files-found: error
