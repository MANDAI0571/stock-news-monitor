name: Daily Discipline Screening

on:
  workflow_dispatch:
  schedule:
    # 07:30 JST, Monday-Friday. GitHub Actions uses UTC.
    - cron: "30 22 * * 0-4"

jobs:
  daily-discipline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QUICK_MODE: "true"
      MAX_SYMBOLS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          start=$(date +%s)
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${QUICK_MODE}" != "true" ]; then
            python -m playwright install --with-deps chromium
          else
            echo "QUICK_MODE=true: skip Playwright install"
          fi
          end=$(date +%s); echo "[TIMER] install_dependencies elapsed=$((end-start))s"

      - name: Run screening and discipline portfolio
        run: |
          start=$(date +%s)
          python daily_discipline_run.py
          end=$(date +%s); echo "[TIMER] daily_discipline_run elapsed=$((end-start))s"

      - name: Build note draft
        run: |
          start=$(date +%s)
          python3 note_draft.py
          end=$(date +%s); echo "[TIMER] note_draft elapsed=$((end-start))s"

      - name: Save note draft in note.com
        if: env.QUICK_MODE != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python3 note_autosave.py

      - name: Send Gmail notification with note URL
        if: env.QUICK_MODE != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 daily_note_mail.py

      - name: Upload CSV outputs
        uses: actions/upload-artifact@v4
        with:
          name: stock-news-monitor-outputs
          path: |
            outputs/*.csv
            outputs/screening_result.csv
            outputs/note_daily.md
            outputs/note_title.txt
            outputs/note_daily.html
            outputs/note_draft_url.txt
          if-no-files-found: warn
