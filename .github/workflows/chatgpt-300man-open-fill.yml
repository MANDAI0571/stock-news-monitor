name: Codex 300man Open Fill

on:
  workflow_dispatch:
  schedule:
    # 09:40 JST, Monday-Friday. Records only the Codex 300万円 paper fills.
    - cron: "40 0 * * 1-5"

permissions:
  actions: read
  contents: write

concurrency:
  group: chatgpt-300man-open-fill
  cancel-in-progress: false

jobs:
  chatgpt-300man-open-fill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest morning candidates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p outputs
          run_id=$(gh run list --workflow daily-discipline.yml --branch "${GITHUB_REF_NAME}" --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -z "$run_id" ]; then
            echo "::warning::successful daily-discipline run was not found"
            exit 0
          fi
          gh run download "$run_id" -n stock-news-monitor-outputs -D outputs

      - name: Record Codex 300万円 opening fills
        run: python3 chatgpt_300man_note.py --output-dir outputs --journal data/chatgpt_300man_journal.csv --record-open

      - name: Show opening fill report
        if: always()
        run: |
          cat outputs/chatgpt_300man_open_fill_report.md 2>/dev/null || true
          tail -n 10 data/chatgpt_300man_journal.csv 2>/dev/null || true

      - name: Commit Codex 300万円 paper journal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chatgpt_300man_journal.csv data/chatgpt_300man_orders.csv docs/codex_300man_ledger.md
          if git diff --cached --quiet; then
            echo "chatgpt_300man_open_fill: changes not found"
            exit 0
          fi
          git commit -m "chore: record Codex 300man open fills [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}" || echo "chatgpt_300man_open_fill: push failed"

      - name: Upload Codex 300万円 open-fill artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-300man-open-fill
          path: |
            data/chatgpt_300man_journal.csv
            data/chatgpt_300man_orders.csv
            docs/codex_300man_ledger.md
            outputs/chatgpt_300man_portfolio.csv
            outputs/chatgpt_300man_open_fill_report.md
          if-no-files-found: warn
